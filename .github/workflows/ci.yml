# Full test matrix on branch pushes and PRs (three OS). Tag pushes use the Release workflow only.
name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  test:
    uses: ./.github/workflows/test.yml
    secrets: inherit

  # Same Dockerfile as GHCR release; verify build only (no registry push).
  docker-build-verify:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: false
          tags: dnsfleet:ci-verify-${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_DNSFLEET_SKIP_ADMIN_AUTH=
