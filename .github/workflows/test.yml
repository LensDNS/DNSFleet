# Reusable: Go fmt/vet/test + Web ci/lint/test/build on Windows, Linux, macOS.
name: Test

on:
  workflow_call:

permissions:
  contents: read
  id-token: write # Codecov OIDC when CODECOV_TOKEN is unset (public repos)

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      # go:embed all:dist requires at least one file before go vet/test compile internal/webui.
      # Replaced by the real Next export after `npm run build` (see Makefile ensure-webui-dist).
      - name: Prepare internal/webui/dist (placeholder for embed)
        run: |
          mkdir -p internal/webui/dist
          printf '%s\n' '<!DOCTYPE html><html><head><meta charset="utf-8"><title>DNSFleet</title></head><body></body></html>' > internal/webui/dist/index.html

      # Needs repo-root .gitattributes (*.go eol=lf); otherwise Windows CRLF makes gofmt -l flag almost every file.
      - name: Go fmt (check only)
        run: |
          set -e
          out="$(gofmt -l ./cmd ./internal 2>/dev/null || true)"
          if [ -n "$out" ]; then
            echo "The following files need gofmt:"
            echo "$out"
            exit 1
          fi

      - name: Go vet
        run: go vet ./cmd/... ./internal/...

      - name: Web — install, lint, test, build
        working-directory: web
        run: |
          npm ci
          npm run lint
          npm run test
          npm run build

      - name: Embed web UI for Go tests
        run: |
          rm -rf internal/webui/dist
          mkdir -p internal/webui/dist
          cp -r web/out/. internal/webui/dist/

      - name: Go test
        run: |
          set -e
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            go test -coverprofile=coverage.out -covermode=atomic ./cmd/... ./internal/...
          else
            go test ./cmd/... ./internal/...
          fi

      # One upload per workflow run (Linux job only). Optional CODECOV_TOKEN; OIDC works for many public repos.
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          use_oidc: true
          files: coverage.out
          flags: go
          fail_ci_if_error: false
          verbose: true
